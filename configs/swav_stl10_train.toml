[algorithm]
name = "swav"
swav_num_prototypes = 300
swav_temperature = 0.1

[model]
backbone = "simple_cnn"
feature_dim = 128
hidden_dim = 256
projection_dim = 128

[optim]
lr = 0.001
weight_decay = 0.0001

[data]
dataset = "stl10"
root = "datasets/data"
split = "unlabeled"
download = false
batch_size = 256
num_workers = 8

[loop]
epochs = 100
seed = 0
device = "cuda"
log_every_n_steps = 50
verbose = 1

[logging]
enabled = true
experiment = "swav_stl10"
results_dir = "results"
tensorboard_dir = "runs"
