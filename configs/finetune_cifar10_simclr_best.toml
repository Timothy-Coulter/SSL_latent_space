pretrained_checkpoint = "results/simclr_cifar10/simclr-20260623-053805/checkpoints/best.pt"
num_classes = 10

[data]
dataset = "cifar10"
root = "datasets/data"
download = false
batch_size = 128
num_workers = 4
image_size = 32

[loop]
epochs = 20
seed = 0
device = "cuda"
log_every_n_steps = 50
verbose = 1
early_stopping_enabled = true
early_stopping_patience = 5
early_stopping_min_delta = 0.0

[optim]
lr = 0.001
weight_decay = 0.0001

[logging]
enabled = true
experiment = "finetune_cifar10_simclr_best"
results_dir = "results"
tensorboard_dir = "runs"
save_best_checkpoint = true

