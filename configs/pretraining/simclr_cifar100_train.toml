model_config = "../models/simple_cnn_128.toml"

[algorithm]
name = "simclr"
temperature = 0.2

[model]
backbone = "simple_cnn"
feature_dim = 128
hidden_dim = 256
projection_dim = 128

[optim]
lr = 0.001
weight_decay = 0.0001

[data]
dataset = "cifar100"
root = "datasets/data"
download = false
batch_size = 256
num_workers = 8

[loop]
epochs = 100
seed = 0
device = "cuda"
log_every_n_steps = 50
verbose = 1

[early_stopping]
enabled = true
patience = 10
min_delta = 0.0

[checkpoint]
save_best = true
save_final = true

[scheduler]
name = "cosine"
interval = "epoch"
t_max = 100
eta_min = 0.0

[logging]
enabled = true
experiment = "simclr_cifar100"
results_dir = "results"
tensorboard_dir = "runs"

[post_pretrain_finetune]
enabled = true
finetune_config = "configs/defaults/finetune_cifar100.toml"
checkpoint = "best"
