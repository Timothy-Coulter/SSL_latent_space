model_config = "../models/simple_cnn_128.toml"

[algorithm]
name = "vicreg"
vicreg_invariance_weight = 25.0
vicreg_variance_weight = 25.0
vicreg_covariance_weight = 1.0

[model]
backbone = "simple_cnn"
feature_dim = 128
hidden_dim = 256
projection_dim = 128

[optim]
lr = 0.001
weight_decay = 0.0001

[data]
dataset = "cifar10"
root = "datasets/data"
download = false
batch_size = 256
num_workers = 8

[loop]
epochs = 100
seed = 0
device = "cuda"
log_every_n_steps = 50
verbose = 1

[early_stopping]
enabled = true
patience = 10
min_delta = 0.0

[checkpoint]
save_best = true
save_final = true

[logging]
enabled = true
experiment = "vicreg_cifar10"
results_dir = "results"
tensorboard_dir = "runs"
